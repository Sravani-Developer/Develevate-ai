name: Bug report
description: Report a reproducible DevElevate AI issue.
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: The roadmap generate button...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact browser/API steps.
      placeholder: |
        1. Start demo mode
        2. Open the resume analyzer
        3. Upload a PDF
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows, Node 20.11, Chrome, demo mode
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Screenshots, logs, console errors, or failing test output.
