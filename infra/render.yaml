services:
  - type: web
    name: develevate-api
    env: node
    plan: starter
    buildCommand: npm ci && npm run build -w packages/shared && npm run build -w apps/api
    startCommand: npm run start -w apps/api
    healthCheckPath: /api/analytics
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JUDGE0_API_KEY
        sync: false
